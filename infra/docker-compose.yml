services:
  api:
    build:
      context: ..
      dockerfile: infra/Dockerfile
    container_name: churn-api
    ports:
      - "8000:8000"
    volumes:
      - ../data:/app/data
      - ../models:/app/models
      - ../mlruns:/app/mlruns
      - ../logs:/app/logs
    command: uvicorn app.api.fastapi_app:app --host 0.0.0.0 --port 8000

  dashboard:
    build:
      context: ..
      dockerfile: infra/Dockerfile
    container_name: churn-dashboard
    ports:
      - "8502:8502"
    volumes:
      - ../data:/app/data
      - ../models:/app/models
      - ../logs:/app/logs
    command: streamlit run app/dashboard/streamlit_app.py --server.address 0.0.0.0 --server.port 8502
