name: CI

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Ruff lint
        run: ruff check .

      - name: Run tests
        env:
          CHURN_API_KEY: test-secret-key
        run: |
          pytest tests/ -v --cov=src --cov=app --cov-report=term-missing --cov-fail-under=75 -m "not slow"

      - name: Dependency audit
        run: pip-audit -r requirements.txt --desc on --vulnerability-severity HIGH,CRITICAL
