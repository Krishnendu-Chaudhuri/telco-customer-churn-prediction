[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I"]
ignore = ["E501"]

[tool.ruff.lint.per-file-ignores]
"tests/*" = ["I001", "E402"]
"app/*" = ["E402"]
"src/models/train_model.py" = ["E402"]
"notebooks/*" = ["E402", "I001", "F401"]
"scripts/*" = ["E402"]
